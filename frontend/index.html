<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Clone Chat</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 900px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
            height: 90vh;
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            text-align: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .header h1 {
            font-size: 24px;
            margin-bottom: 5px;
        }

        .status {
            font-size: 12px;
            opacity: 0.9;
        }

        .status.online {
            color: #4ade80;
        }

        .status.offline {
            color: #f87171;
        }

        .chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #f8f9fa;
        }

        .message {
            margin-bottom: 15px;
            display: flex;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.user {
            justify-content: flex-end;
        }

        .message.bot {
            justify-content: flex-start;
        }

        .message-content {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 12px;
            word-wrap: break-word;
        }

        .message.user .message-content {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .message.bot .message-content {
            background: #e5e7eb;
            color: #1f2937;
        }

        .metadata {
            font-size: 11px;
            margin-top: 5px;
            opacity: 0.7;
            padding: 0 10px;
        }

        .input-section {
            padding: 20px;
            border-top: 1px solid #e5e7eb;
            background: white;
        }

        .upload-area {
            margin-bottom: 15px;
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .file-input-wrapper {
            position: relative;
            overflow: hidden;
            display: inline-block;
        }

        .file-input-wrapper input {
            position: absolute;
            left: -9999px;
        }

        .upload-btn {
            background: #10b981;
            color: white;
            padding: 10px 16px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.3s;
        }

        .upload-btn:hover {
            background: #059669;
        }

        .file-name {
            font-size: 13px;
            color: #6b7280;
        }

        .input-container {
            display: flex;
            gap: 10px;
        }

        .message-input {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
            resize: none;
            max-height: 100px;
        }

        .message-input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .send-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: transform 0.2s;
        }

        .send-btn:hover {
            transform: translateY(-2px);
        }

        .send-btn:active {
            transform: translateY(0);
        }

        .send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .controls {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        .control-btn {
            padding: 8px 12px;
            background: #f3f4f6;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            transition: background 0.3s;
        }

        .control-btn:hover {
            background: #e5e7eb;
        }

        .control-btn.danger {
            background: #fee2e2;
            border-color: #fecaca;
            color: #991b1b;
        }

        .control-btn.danger:hover {
            background: #fecaca;
        }

        .loading {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: #667eea;
            border-radius: 50%;
            animation: pulse 1.5s infinite;
            margin-right: 5px;
        }

        @keyframes pulse {
            0%, 100% {
                opacity: 1;
            }
            50% {
                opacity: 0.3;
            }
        }

        .empty-state {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100%;
            color: #9ca3af;
            text-align: center;
        }

        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 15px;
        }

        .error-message {
            background: #fee2e2;
            color: #991b1b;
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 10px;
            border-left: 4px solid #dc2626;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🤖 AI Clone Chat</h1>
            <div class="status online" id="status">● Online</div>
        </div>

        <div class="chat-area" id="chatArea">
            <div class="empty-state">
                <div class="empty-state-icon">💬</div>
                <div>No messages yet. Start chatting!</div>
                <div style="font-size: 12px; margin-top: 10px; opacity: 0.6;">
                    Upload a PDF to give the AI more context, or just start asking questions
                </div>
            </div>
        </div>

        <div class="input-section">
            <div id="errorContainer"></div>

            <div class="upload-area">
                <div class="file-input-wrapper">
                    <button class="upload-btn">📄 Upload PDF</button>
                    <input type="file" id="pdfInput" accept=".pdf" />
                </div>
                <span class="file-name" id="fileName">No file selected</span>
            </div>

            <div class="input-container">
                <textarea
                    class="message-input"
                    id="messageInput"
                    placeholder="Ask me anything..."
                    rows="1"
                ></textarea>
                <button class="send-btn" id="sendBtn">Send</button>
            </div>

            <div class="controls">
                <button class="control-btn" id="clearBtn">🧹 Clear Memory</button>
                <button class="control-btn" id="statusBtn">📊 Status</button>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:8000';
        let messages = [];
        let isLoading = false;

        const chatArea = document.getElementById('chatArea');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const pdfInput = document.getElementById('pdfInput');
        const clearBtn = document.getElementById('clearBtn');
        const statusBtn = document.getElementById('statusBtn');
        const errorContainer = document.getElementById('errorContainer');
        const fileName = document.getElementById('fileName');
        const statusDiv = document.getElementById('status');

        // Auto-resize textarea
        messageInput.addEventListener('input', () => {
            messageInput.style.height = 'auto';
            messageInput.style.height = Math.min(messageInput.scrollHeight, 100) + 'px';
        });

        // Send message
        async function sendMessage() {
            const query = messageInput.value.trim();
            if (!query || isLoading) return;

            // Add user message
            addMessage('user', query);
            messageInput.value = '';
            messageInput.style.height = 'auto';
            isLoading = true;
            sendBtn.disabled = true;

            try {
                const response = await fetch(`${API_URL}/chat`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query, use_pdf_only: false })
                });

                if (!response.ok) throw new Error('Failed to get response');

                const data = await response.json();
                addMessage('bot', data.response, {
                    sources: data.sources,
                    score: data.relevance_score,
                    memory: data.memory_count
                });

                clearError();
            } catch (error) {
                showError('Failed to send message: ' + error.message);
                addMessage('bot', '❌ Sorry, I encountered an error. Please try again.');
            } finally {
                isLoading = false;
                sendBtn.disabled = false;
            }
        }

        // Add message to chat
        function addMessage(sender, text, metadata = null) {
            if (chatArea.querySelector('.empty-state')) {
                chatArea.innerHTML = '';
            }

            const messageEl = document.createElement('div');
            messageEl.className = `message ${sender}`;

            const contentEl = document.createElement('div');
            contentEl.className = 'message-content';
            contentEl.textContent = text;

            messageEl.appendChild(contentEl);

            if (metadata) {
                const metaEl = document.createElement('div');
                metaEl.className = 'metadata';
                let metaText = '';
                if (metadata.score !== undefined) {
                    metaText += `📊 Score: ${(metadata.score * 100).toFixed(0)}% `;
                }
                if (metadata.sources && metadata.sources.length > 0) {
                    metaText += `📚 ${metadata.sources.length} sources `;
                }
                if (metadata.memory !== undefined) {
                    metaText += `💾 ${metadata.memory} interactions`;
                }
                metaEl.textContent = metaText;
                messageEl.appendChild(metaEl);
            }

            chatArea.appendChild(messageEl);
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        // Upload PDF
        async function uploadPDF() {
            const file = pdfInput.files[0];
            if (!file) return;

            isLoading = true;
            sendBtn.disabled = true;

            try {
                const formData = new FormData();
                formData.append('file', file);

                const response = await fetch(`${API_URL}/upload-pdf`, {
                    method: 'POST',
                    body: formData
                });

                if (!response.ok) throw new Error('Upload failed');

                const data = await response.json();
                showError(`✅ ${data.message}`, 'success');
                fileName.textContent = `✓ ${file.name} (${data.chunks_added} chunks)`;
                pdfInput.value = '';

                clearError();
            } catch (error) {
                showError('PDF upload failed: ' + error.message);
            } finally {
                isLoading = false;
                sendBtn.disabled = false;
            }
        }

        // Clear memory
        async function clearMemory() {
            if (!confirm('Clear all conversation history?')) return;

            try {
                const response = await fetch(`${API_URL}/clear-memory`, {
                    method: 'POST'
                });

                if (!response.ok) throw new Error('Failed to clear memory');

                messages = [];
                chatArea.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">💬</div>
                        <div>Memory cleared. Starting fresh!</div>
                    </div>
                `;
                showError('✅ Memory cleared', 'success');
                setTimeout(clearError, 3000);
            } catch (error) {
                showError('Failed to clear memory: ' + error.message);
            }
        }

        // Show status
        async function showStatus() {
            try {
                const response = await fetch(`${API_URL}/status`);
                if (!response.ok) throw new Error('Status check failed');

                const data = await response.json();
                alert(`
📊 System Status
━━━━━━━━━━━━━━━
Status: ${data.status}
PDF Loaded: ${data.pdf_loaded ? '✅ Yes' : '❌ No'}
Memory Size: ${data.memory_size} interactions
                `);
            } catch (error) {
                showError('Failed to get status: ' + error.message);
            }
        }

        // Error handling
        function showError(message, type = 'error') {
            const errorEl = document.createElement('div');
            errorEl.className = type === 'success' ? 'error-message' : 'error-message';
            errorEl.style.backgroundColor = type === 'success' ? '#dcfce7' : '#fee2e2';
            errorEl.style.color = type === 'success' ? '#15803d' : '#991b1b';
            errorEl.style.borderLeftColor = type === 'success' ? '#22c55e' : '#dc2626';
            errorEl.textContent = message;
            errorContainer.appendChild(errorEl);
        }

        function clearError() {
            errorContainer.innerHTML = '';
        }

        // Event listeners
        sendBtn.addEventListener('click', sendMessage);
        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        pdfInput.addEventListener('change', uploadPDF);
        document.querySelector('.upload-btn').addEventListener('click', () => pdfInput.click());
        clearBtn.addEventListener('click', clearMemory);
        statusBtn.addEventListener('click', showStatus);

        // Check API health on load
        async function checkHealth() {
            try {
                const response = await fetch(`${API_URL}/health`);
                statusDiv.textContent = '● Online';
                statusDiv.className = 'status online';
            } catch (error) {
                statusDiv.textContent = '● Offline (Start backend server)';
                statusDiv.className = 'status offline';
            }
        }

        checkHealth();
    </script>
</body>
</html>
